# what is the goal for this workflow
#Goal: whenever someone changes in the python code , the linter will check if the syntax, format, indentation(Linting) is correct or not

name: Auto Linter

on:
  push: 
    paths: "*.py"

jobs:
  code-linter:
    runs-on: ubuntu-latest
    #this step will automatically clone the code of the current branch into the runner
    steps:
      - name: Checkout/clone the code
        uses: actions/checkout@v7
        #this step will setup python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
         #this step will run the linting tool
      - name: Install Linter
        run: pip install ruff
        #this step will run the linter
      - name: Check the files for linting
        run: ruff check .
